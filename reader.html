<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulle — Your Guides</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
@font-face {
  font-family: 'ApfelMittel';
  src: url('https://raw.githubusercontent.com/allegrahamrin/bulle-fonts/main/ApfelGrotezk-Mittel.woff2') format('woff2');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Absans';
  src: url('https://raw.githubusercontent.com/allegrahamrin/bulle-fonts/main/Absans-Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal; font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

:root {
  --cream:  #F4F1E1;
  --rose:   #C98D9B;
  --taupe:  #AB8D73;
  --dark:   #260D0D;
  --dark60: rgba(38,13,13,0.6);
  --dark30: rgba(38,13,13,0.3);
  --dark12: rgba(38,13,13,0.12);
  --dark06: rgba(38,13,13,0.06);
  --cream50: rgba(244,241,225,0.5);
  --cream20: rgba(244,241,225,0.2);
  --panel-w: 380px;
}

body {
  font-family: 'Absans', 'Helvetica Neue', sans-serif;
  background: var(--dark);
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 56px;
  background: var(--dark);
  border-bottom: 1px solid rgba(244,241,225,0.08);
  display: flex; align-items: center;
  padding: 0 24px;
  justify-content: space-between;
}
.nav-logo {
  font-family: 'ApfelMittel', Georgia, serif;
  font-size: 18px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--cream);
  text-decoration: none;
}
.nav-right {
  display: flex; align-items: center; gap: 20px;
}
.nav-filter-btn {
  font-family: 'Absans', sans-serif;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--cream50);
  background: none; border: 0.5px solid rgba(244,241,225,0.15);
  padding: 6px 14px; cursor: pointer; border-radius: 20px;
  transition: all 0.2s;
}
.nav-filter-btn:hover,
.nav-filter-btn.active { color: var(--cream); border-color: var(--rose); }
.nav-filter-btn.active { background: rgba(201,141,155,0.12); color: var(--rose); }

/* ── LAYOUT ── */
.layout {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 0;
  display: flex;
}

/* ── MAP ── */
#map {
  flex: 1;
  height: 100%;
}

/* ── SIDE PANEL ── */
.panel {
  width: var(--panel-w);
  height: 100%;
  background: var(--cream);
  display: flex; flex-direction: column;
  border-left: 1px solid var(--dark12);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.panel-header {
  padding: 24px 24px 16px;
  border-bottom: 0.5px solid var(--dark12);
  flex-shrink: 0;
}
.panel-eyebrow {
  font-family: 'Absans', sans-serif;
  font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--rose);
  margin-bottom: 6px; display: block;
}
.panel-title {
  font-family: 'ApfelMittel', Georgia, serif;
  font-size: 22px; color: var(--dark);
  line-height: 1.1; margin-bottom: 4px;
}
.panel-title em { color: var(--rose); font-style: normal; }
.panel-count {
  font-family: 'Absans', sans-serif;
  font-size: 11px; color: var(--dark30);
}

/* category tabs */
.cat-tabs {
  display: flex; gap: 6px;
  padding: 12px 24px;
  border-bottom: 0.5px solid var(--dark12);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.cat-tab {
  font-family: 'Absans', sans-serif;
  font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 12px; border-radius: 20px;
  border: 0.5px solid var(--dark12);
  background: white; color: var(--dark60);
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.cat-tab:hover { border-color: var(--rose); color: var(--rose); }
.cat-tab.active { background: var(--dark); color: var(--cream); border-color: var(--dark); }

/* place list */
.place-list {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
}
.place-list::-webkit-scrollbar { width: 3px; }
.place-list::-webkit-scrollbar-track { background: transparent; }
.place-list::-webkit-scrollbar-thumb { background: var(--dark12); border-radius: 2px; }

.place-item {
  padding: 16px 24px;
  border-bottom: 0.5px solid var(--dark06);
  cursor: pointer; transition: background 0.15s;
  position: relative;
}
.place-item:hover { background: rgba(38,13,13,0.03); }
.place-item.active { background: rgba(201,141,155,0.07); }
.place-item.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--rose);
}

.place-cat-tag {
  font-family: 'Absans', sans-serif;
  font-size: 8px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--rose);
  margin-bottom: 5px; display: block; opacity: 0.8;
}
.place-name {
  font-family: 'ApfelMittel', Georgia, serif;
  font-size: 15px; color: var(--dark);
  margin-bottom: 3px; line-height: 1.2;
}
.place-headline {
  font-family: 'Absans', sans-serif;
  font-size: 11px; color: var(--dark60);
  line-height: 1.5; margin-bottom: 6px;
}
.place-tags {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.place-tag {
  font-family: 'Absans', sans-serif;
  font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--dark30);
  border: 0.5px solid var(--dark12);
  padding: 2px 7px; border-radius: 10px;
}

/* ── DETAIL CARD (bottom of panel) ── */
.detail-card {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--dark);
  border-top: 1px solid rgba(244,241,225,0.1);
  padding: 20px 24px 24px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height: 55%;
  overflow-y: auto;
  z-index: 20;
}
.detail-card.open { transform: translateY(0); }
.detail-card::-webkit-scrollbar { width: 3px; }
.detail-card::-webkit-scrollbar-thumb { background: rgba(244,241,225,0.1); }

.detail-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none;
  color: var(--cream50); cursor: pointer;
  font-size: 18px; line-height: 1;
  transition: color 0.2s;
}
.detail-close:hover { color: var(--cream); }
.detail-eyebrow {
  font-family: 'Absans', sans-serif;
  font-size: 8px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--rose);
  margin-bottom: 8px; display: block;
}
.detail-name {
  font-family: 'ApfelMittel', Georgia, serif;
  font-size: 20px; color: var(--cream);
  line-height: 1.1; margin-bottom: 6px;
}
.detail-headline {
  font-family: 'ApfelMittel', Georgia, serif;
  font-size: 13px; color: var(--cream50);
  font-style: italic; line-height: 1.5;
  margin-bottom: 14px;
}
.detail-desc {
  font-family: 'Absans', sans-serif;
  font-size: 12px; color: rgba(244,241,225,0.65);
  line-height: 1.7; margin-bottom: 16px;
}
.detail-address {
  font-family: 'Absans', sans-serif;
  font-size: 10px; color: var(--cream50);
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
}
.detail-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-top: 12px;
}
.detail-tag {
  font-family: 'Absans', sans-serif;
  font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 9px; border-radius: 20px;
  border: 0.5px solid rgba(244,241,225,0.15);
  color: var(--cream50);
}

/* ── MAPBOX CUSTOM MARKERS ── */
.marker {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--rose);
  border: 2px solid rgba(244,241,225,0.9);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 1px 4px rgba(38,13,13,0.3);
}
.marker:hover { transform: scale(1.4); }
.marker.active {
  transform: scale(1.5);
  background: var(--cream);
  border-color: var(--rose);
  box-shadow: 0 2px 8px rgba(201,141,155,0.5);
}
.marker.outside-milan {
  background: var(--taupe);
  border-color: rgba(244,241,225,0.7);
}

/* mapbox popup */
.mapboxgl-popup-content {
  background: var(--dark) !important;
  color: var(--cream) !important;
  border-radius: 6px !important;
  padding: 12px 16px !important;
  font-family: 'Absans', sans-serif !important;
  font-size: 12px !important;
  max-width: 200px !important;
  border: 0.5px solid rgba(244,241,225,0.12) !important;
  box-shadow: 0 4px 20px rgba(38,13,13,0.4) !important;
}
.mapboxgl-popup-tip { display: none !important; }
.mapboxgl-popup-close-button { color: var(--cream50) !important; font-size: 16px !important; }
.popup-name {
  font-family: 'ApfelMittel', Georgia, serif;
  font-size: 14px; color: var(--cream);
  margin-bottom: 3px;
}
.popup-area {
  font-size: 10px; color: var(--cream50);
  letter-spacing: 0.06em;
}

/* ── MAP ATTRIBUTION ── */
.mapboxgl-ctrl-bottom-right { display: none; }
.mapboxgl-ctrl-bottom-left { bottom: 8px !important; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  :root { --panel-w: 100vw; }
  .layout { flex-direction: column; }
  #map { flex: 1; min-height: 50vh; }
  .panel {
    width: 100%;
    height: 50%;
    border-left: none;
    border-top: 1px solid var(--dark12);
  }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Bulle</a>
  <div class="nav-right">
    <button class="nav-filter-btn active" data-filter="all" onclick="filterCategory('all', this)">All</button>
    <button class="nav-filter-btn" data-filter="worth" onclick="filterCategory('worth', this)">Worth your evening</button>
    <button class="nav-filter-btn" data-filter="hidden" onclick="filterCategory('hidden', this)">Not talking about yet</button>
  </div>
</nav>

<div class="layout">
  <div id="map"></div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-eyebrow">Your curated selection</span>
      <h2 class="panel-title">Milan <em>&</em> beyond</h2>
      <span class="panel-count" id="placeCount">9 addresses</span>
    </div>

    <div class="cat-tabs" id="catTabs"></div>

    <div class="place-list" id="placeList"></div>

    <div class="detail-card" id="detailCard">
      <button class="detail-close" onclick="closeDetail()">×</button>
      <span class="detail-eyebrow" id="dEyebrow"></span>
      <h3 class="detail-name" id="dName"></h3>
      <p class="detail-headline" id="dHeadline"></p>
      <p class="detail-desc" id="dDesc"></p>
      <div class="detail-address" id="dAddress">
        <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 0C2.79 0 1 1.79 1 4c0 3 4 8 4 8s4-5 4-8c0-2.21-1.79-4-4-4zm0 5.5A1.5 1.5 0 1 1 5 2.5a1.5 1.5 0 0 1 0 3z" fill="rgba(244,241,225,0.4)"/></svg>
        <span id="dAddressText"></span>
      </div>
      <div class="detail-tags" id="dTags"></div>
    </div>
  </div>
</div>

<script>
// ── TOKEN ──────────────────────────────────────────────────────────────────
// Replace with your Mapbox public token
mapboxgl.accessToken = 'pk.eyJ1IjoiYWxsZWdyYWhhbXJpbiIsImEiOiJjbW9rMDRhcWMwMzhjMnRzYWswdTM3djN5In0.kdAqX0x2m3f5qbwxbkU6YQ';

// ── DATA ───────────────────────────────────────────────────────────────────
const PLACES = [
  {
    id: 'terroir',
    name: 'Terroir Milano',
    category: 'Wine bars worth your evening',
    cat_key: 'worth',
    subcategory: ['Bottle shop', 'Glass'],
    area: 'Porta Venezia',
    address: 'Via Macedonio Melloni, 33',
    headline: 'The bottle shop that makes you lose track of time.',
    description: 'Not just a wine shop — a gourmet deli where the line between doing your shopping and staying for a glass dissolves completely. Opened in 2017 by Gabriele Ornati, Terroir draws locals and serious drinkers in search of natural wines from across Europe — Georgia, Lebanon, Austria — alongside specialty coffee, bean-to-bar chocolate and Slow Food Presidia products. The staff know every label on the shelf and know exactly when to tell you about it.',
    lat: 45.4654, lng: 9.2156,
    outside_milan: false,
  },
  {
    id: 'atypique',
    name: 'Atypique',
    category: 'Wine bars worth your evening',
    cat_key: 'worth',
    subcategory: ['Wine bar', 'Kitchen'],
    area: 'Moscova',
    address: 'Via Alessandro Volta, Moscova',
    headline: 'Artisan wine, good food and the right music.',
    description: 'Opened in October 2023 by Simone Marchiori and Gabriele Natale, Atypique is one of the most interesting places to emerge from Milan\'s latest wave. On Via Alessandro Volta, the wine list moves between small Italian and French producers with bottles you won\'t easily find elsewhere. The sommelier guides you without making you feel guided — two words and you\'re pointed in the right direction. The food is good: bruschetta, boards, smash burger. Warm atmosphere, considered music.',
    lat: 45.4791, lng: 9.1887,
    outside_milan: false,
  },
  {
    id: 'en',
    name: 'e/n enoteca naturale',
    category: 'Wine bars worth your evening',
    cat_key: 'worth',
    subcategory: ['Kitchen', 'Bottle shop'],
    area: 'Ticinese',
    address: 'Via Santa Croce, 19',
    headline: 'Where wine becomes an ethical position.',
    description: 'e/n was born in 2018 inside Casa Emergency — the Milanese headquarters of the humanitarian organisation — and carries the full weight of that choice. The garden overlooking the Basilica di Sant\'Eustorgio is one of the most beautiful spots in the city for a glass. The wine list rotates weekly, with over 4,000 labels cycled through the shelves over time: artisan producers from across Europe, selected for quality and positive territorial impact.',
    lat: 45.4558, lng: 9.1832,
    outside_milan: false,
  },
  {
    id: 'meste',
    name: 'Mestè',
    category: 'Wine bars worth your evening',
    cat_key: 'worth',
    subcategory: ['Kitchen', 'Bottle shop', 'Natural wine'],
    area: 'Bocconi · Porta Romana',
    address: 'Via Corrado II il Salico, 12',
    headline: 'The osteria that knows its craft — in the most Milanese sense of the word.',
    description: 'The name comes from Milanese dialect: mestè, trade. And Daniele Santangelo and Marco Bonardi genuinely know theirs. The kitchen is Lombard-Piedmontese tradition, executed properly: vitello tonnato with rabbit, Piacenza tortelli, fried tripe. The wines — irreverent and sometimes brutal, as he calls them — are the soul of the place. Few tables, wood and brick, no excess. It becomes your local faster than you expect.',
    lat: 45.4488, lng: 9.2012,
    outside_milan: false,
  },
  {
    id: 'temp',
    name: 'Temp Enoteca',
    category: 'Wine bars worth your evening',
    cat_key: 'worth',
    subcategory: ['Wine bar', 'Bottle shop'],
    area: 'Risorgimento',
    address: 'Via Pasquale Sottocorno, 17',
    headline: 'An agricultural landscape in the middle of Milan.',
    description: 'Emanuele Romanelli opened Temp in October 2022 after years at Davide Longoni and Flor, with a precise idea: bringing the slow pace of the countryside into a city that never stops. No wine list as such — around 350 labels in rotation, predominantly Italy and France, all from small producers with whom Emanuele has a direct relationship. The real value is Emanuele himself, who knows how to guide you without taking away the pleasure of discovery.',
    lat: 45.4662, lng: 9.2187,
    outside_milan: false,
  },
  {
    id: 'canaglia',
    name: 'Canaglia',
    category: 'Wine bars you\'re not talking about yet',
    cat_key: 'hidden',
    subcategory: ['Wine bar', 'Kitchen'],
    area: 'Lodi · Southeast Milan',
    address: 'Piazza Martini, Lodi',
    headline: 'A neighbourhood wine bar that doesn\'t know it\'s a neighbourhood wine bar.',
    description: 'Tucked into a small piazza in Lodi — a part of Milan that hasn\'t bothered to become fashionable — Canaglia feels genuinely removed from the city\'s noise. You go here to escape, not to be seen. The wine selection is sharper than the address might suggest, the small plates are worth staying for, and the square outside has the kind of unhurried energy that\'s increasingly rare in this city.',
    lat: 45.3481, lng: 9.3481,
    outside_milan: false,
  },
  {
    id: 'ironica',
    name: 'Ironica Bar',
    category: 'Wine bars you\'re not talking about yet',
    cat_key: 'hidden',
    subcategory: ['Wine bar', 'Kitchen'],
    area: 'Lambrate',
    address: 'Via Carlo Valvassori Peroni, 83',
    headline: 'Lucanian soul in a room that looks like a design studio.',
    description: 'Lambrate has been on the edge of interesting for a while now, and Ironica Bar is a good reason to finally make the trip. The design is contemporary and considered — the kind of space that photographs well but also functions perfectly — and it sits in productive tension with a menu rooted in southern Italian tradition. The strazzate and the Lucanian dishes are the point. The wine list earns its place alongside them.',
    lat: 45.4731, lng: 9.2441,
    outside_milan: false,
  },
  {
    id: 'deposito',
    name: 'Deposito Enoteca',
    category: 'Wine bars you\'re not talking about yet',
    cat_key: 'hidden',
    subcategory: ['Wine bar', 'Kitchen', 'Bottle shop'],
    area: 'Porta Venezia',
    address: 'Via Felice Casati, 1',
    headline: 'The enoteca that never needs to reinvent itself.',
    description: 'There\'s a particular kind of Milanese enoteca — warm, unhurried, slightly worn at the edges in the best way — that Deposito has mastered without appearing to try. In Porta Venezia, it holds its ground with a menu that ranges from small plates and antipasti to proper first courses. The cavallo tonnato is the thing to order. The wine list is broad and honest.',
    lat: 45.4711, lng: 9.2089,
    outside_milan: false,
  },
  {
    id: 'infernot',
    name: 'Infernot',
    category: 'Wine bars you\'re not talking about yet',
    cat_key: 'hidden',
    subcategory: ['Wine bar', 'Bottle shop', 'Kitchen'],
    area: 'Pavia · 35 min from Milan',
    address: 'Pavia',
    headline: 'Worth leaving the city for. Actually worth it.',
    description: 'Pavia is thirty-five minutes from Milan and feels like a different world — which is partly the point. Infernot is run with infectious enthusiasm and first-rate ingredients. The natural wine selection covers local territory and further afield with real clarity of vision. The low-temperature salt cod is exceptional. The charcuterie is serious. The chocolate cake, if you stay for dinner, is not optional.',
    lat: 45.1847, lng: 9.1582,
    outside_milan: true,
  },
];

// ── STATE ──────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let activePlaceId = null;
let markers = {};

// ── MAP INIT ───────────────────────────────────────────────────────────────
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [9.1900, 45.4654],
  zoom: 12.5,
  attributionControl: false,
});

map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-left');

map.on('load', () => {
  // Custom map style tweaks
  map.setPaintProperty('background', 'background-color', '#1a0f0f');

  initMarkers();
  renderList();
  buildCatTabs();
});

// ── MARKERS ────────────────────────────────────────────────────────────────
function initMarkers() {
  PLACES.forEach(place => {
    const el = document.createElement('div');
    el.className = 'marker' + (place.outside_milan ? ' outside-milan' : '');
    el.dataset.id = place.id;

    const popup = new mapboxgl.Popup({ offset: 12, closeButton: false, closeOnClick: false })
      .setHTML(`<div class="popup-name">${place.name}</div><div class="popup-area">${place.area}</div>`);

    const marker = new mapboxgl.Marker(el)
      .setLngLat([place.lng, place.lat])
      .setPopup(popup)
      .addTo(map);

    el.addEventListener('mouseenter', () => { if (activePlaceId !== place.id) marker.getPopup().addTo(map); });
    el.addEventListener('mouseleave', () => { marker.getPopup().remove(); });
    el.addEventListener('click', () => selectPlace(place.id));

    markers[place.id] = { marker, el };
  });
}

// ── CATEGORY TABS ──────────────────────────────────────────────────────────
function buildCatTabs() {
  const subcats = [...new Set(PLACES.flatMap(p => p.subcategory))].sort();
  const container = document.getElementById('catTabs');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-tab active';
  allBtn.textContent = 'All types';
  allBtn.onclick = () => filterSubcat(null, allBtn);
  container.appendChild(allBtn);

  subcats.forEach(sc => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab';
    btn.textContent = sc;
    btn.onclick = () => filterSubcat(sc, btn);
    container.appendChild(btn);
  });
}

let activeSubcat = null;
function filterSubcat(sc, btn) {
  activeSubcat = sc;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
  updateMarkerVisibility();
}

// ── FILTER ─────────────────────────────────────────────────────────────────
function filterCategory(key, btn) {
  activeFilter = key;
  document.querySelectorAll('.nav-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closeDetail();
  renderList();
  updateMarkerVisibility();
}

function getFiltered() {
  return PLACES.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat_key === activeFilter;
    const matchSub = !activeSubcat || p.subcategory.includes(activeSubcat);
    return matchCat && matchSub;
  });
}

function updateMarkerVisibility() {
  const visible = new Set(getFiltered().map(p => p.id));
  Object.entries(markers).forEach(([id, { el }]) => {
    el.style.opacity = visible.has(id) ? '1' : '0.15';
    el.style.pointerEvents = visible.has(id) ? 'auto' : 'none';
  });
}

// ── LIST RENDER ────────────────────────────────────────────────────────────
function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById('placeList');
  document.getElementById('placeCount').textContent = `${filtered.length} address${filtered.length !== 1 ? 'es' : ''}`;

  list.innerHTML = filtered.map(p => `
    <div class="place-item ${activePlaceId === p.id ? 'active' : ''}" onclick="selectPlace('${p.id}')">
      <span class="place-cat-tag">${p.cat_key === 'worth' ? 'Worth your evening' : 'Not talking about yet'}${p.outside_milan ? ' · Outside Milan' : ''}</span>
      <div class="place-name">${p.name}</div>
      <div class="place-headline">${p.headline}</div>
      <div class="place-tags">${p.subcategory.map(s => `<span class="place-tag">${s}</span>`).join('')}</div>
    </div>
  `).join('');
}

// ── SELECT PLACE ───────────────────────────────────────────────────────────
function selectPlace(id) {
  const place = PLACES.find(p => p.id === id);
  if (!place) return;

  // deselect previous
  if (activePlaceId && markers[activePlaceId]) {
    markers[activePlaceId].el.classList.remove('active');
  }

  activePlaceId = id;
  markers[id].el.classList.add('active');

  // fly to
  map.flyTo({
    center: [place.lng, place.lat],
    zoom: place.outside_milan ? 13 : 14.5,
    duration: 900,
    essential: true
  });

  // update list highlight
  document.querySelectorAll('.place-item').forEach((el, i) => {
    const filtered = getFiltered();
    el.classList.toggle('active', filtered[i]?.id === id);
  });

  // scroll list item into view
  const items = document.querySelectorAll('.place-item');
  const filtered = getFiltered();
  const idx = filtered.findIndex(p => p.id === id);
  if (idx >= 0 && items[idx]) {
    items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // show detail
  openDetail(place);
}

// ── DETAIL CARD ────────────────────────────────────────────────────────────
function openDetail(place) {
  document.getElementById('dEyebrow').textContent = place.area;
  document.getElementById('dName').textContent = place.name;
  document.getElementById('dHeadline').textContent = place.headline;
  document.getElementById('dDesc').textContent = place.description;
  document.getElementById('dAddressText').textContent = place.address;
  document.getElementById('dTags').innerHTML = place.subcategory
    .map(s => `<span class="detail-tag">${s}</span>`).join('');
  document.getElementById('detailCard').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailCard').classList.remove('open');
  if (activePlaceId && markers[activePlaceId]) {
    markers[activePlaceId].el.classList.remove('active');
  }
  activePlaceId = null;
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('active'));
}
</script>
</body>
</html>
